services:
  mysql:
    image: mysql:8.0
    container_name: dao-home-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?set MYSQL_ROOT_PASSWORD in .env}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-dao_home}
      TZ: Asia/Shanghai
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci
      - --default-time-zone=+08:00
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: dao-home-app:latest
    container_name: dao-home-app
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DB_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-dao_home}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&createDatabaseIfNotExist=true
      DB_USERNAME: root
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD:?set MYSQL_ROOT_PASSWORD in .env}
      APP_UPLOAD_DIR: /app/uploads
      WECHAT_MP_ENABLED: ${WECHAT_MP_ENABLED:-false}
      WECHAT_MP_APP_ID: ${WECHAT_MP_APP_ID:-}
      WECHAT_MP_APP_SECRET: ${WECHAT_MP_APP_SECRET:-}
      WECHAT_MP_TOKEN: ${WECHAT_MP_TOKEN:-}
      WECHAT_MP_ENCODING_AES_KEY: ${WECHAT_MP_ENCODING_AES_KEY:-}
      WECHAT_MP_OAUTH_CALLBACK_URL: ${WECHAT_MP_OAUTH_CALLBACK_URL:-https://zjwndj.com/api/wechat/oauth/callback}
      WECHAT_MP_OAUTH_SCOPE: ${WECHAT_MP_OAUTH_SCOPE:-snsapi_base}
      TZ: Asia/Shanghai
      JAVA_OPTS: ${JAVA_OPTS:-}
    ports:
      - "127.0.0.1:${APP_PORT:-8080}:8080"
    volumes:
      - app-uploads:/app/uploads

volumes:
  mysql-data:
  app-uploads:
