server:
  port: 8080

spring:
  application:
    name: dao-home
  datasource:
    url: "${DB_URL:jdbc:mysql://localhost:3306/dao_home?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&createDatabaseIfNotExist=true}"
    username: "${DB_USERNAME:root}"
    password: "${DB_PASSWORD:}"
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 6MB

app:
  upload-dir: ${user.dir}/uploads

wechat:
  official-account:
    enabled: "${WECHAT_MP_ENABLED:false}"
    app-id: "${WECHAT_MP_APP_ID:}"
    app-secret: "${WECHAT_MP_APP_SECRET:}"
    token: "${WECHAT_MP_TOKEN:}"
    encoding-aes-key: "${WECHAT_MP_ENCODING_AES_KEY:}"
    oauth-callback-url: "${WECHAT_MP_OAUTH_CALLBACK_URL:https://zjwndj.com/api/wechat/oauth/callback}"
    oauth-scope: "${WECHAT_MP_OAUTH_SCOPE:snsapi_base}"
